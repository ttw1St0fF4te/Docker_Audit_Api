spring.datasource.url=jdbc:h2:mem:${random.uuid};MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

app.clickhouse.url=jdbc:clickhouse://localhost:8123/default
app.clickhouse.username=default
app.clickhouse.password=
app.clickhouse.driver-class-name=com.clickhouse.jdbc.ClickHouseDriver