databaseChangeLog:
  - changeSet:
      id: 001-create-audit-run-table
      author: copilot
      changes:
        - createTable:
            tableName: audit_run
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: source
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(32)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
  - changeSet:
      id: 002-create-role-table
      author: copilot
      changes:
        - createTable:
            tableName: app_role
            columns:
              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: code
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: display_name
                  type: VARCHAR(128)
                  constraints:
                    nullable: false
        - insert:
            tableName: app_role
            columns:
              - column:
                  name: id
                  valueNumeric: 1
              - column:
                  name: code
                  value: SUPER_ADMIN
              - column:
                  name: display_name
                  value: Супер-администратор
        - insert:
            tableName: app_role
            columns:
              - column:
                  name: id
                  valueNumeric: 2
              - column:
                  name: code
                  value: SECURITY_ENGINEER
              - column:
                  name: display_name
                  value: Инженер-безопасности
        - insert:
            tableName: app_role
            columns:
              - column:
                  name: id
                  valueNumeric: 3
              - column:
                  name: code
                  value: DEVELOPER
              - column:
                  name: display_name
                  value: Разработчик
  - changeSet:
      id: 003-create-user-table
      author: copilot
      changes:
        - createTable:
            tableName: app_user
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: username
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: full_name
                  type: VARCHAR(160)
                  constraints:
                    nullable: false
              - column:
                  name: password_hash
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: enabled
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: role_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: app_user
            baseColumnNames: role_id
            referencedTableName: app_role
            referencedColumnNames: id
            constraintName: fk_app_user_role

  - include:
      file: db/changelog/004-security-engineer-stage1.yaml

  - include:
      file: db/changelog/012-notification-severity-settings.yaml