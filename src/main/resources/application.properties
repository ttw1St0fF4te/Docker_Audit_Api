spring.application.name=docker-audit-api
spring.config.import=optional:file:.env[.properties]
server.port=${SERVER_PORT:8080}

spring.datasource.url=${APP_POSTGRES_URL:jdbc:postgresql://localhost:5432/audit_db}
spring.datasource.username=${APP_POSTGRES_USER:audit_user}
spring.datasource.password=${APP_POSTGRES_PASSWORD:secure_password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

app.clickhouse.url=${APP_CLICKHOUSE_URL:jdbc:clickhouse://localhost:8123/audit_analytics?compress=0}
app.clickhouse.username=${APP_CLICKHOUSE_USER:audit_user}
app.clickhouse.password=${APP_CLICKHOUSE_PASSWORD:secure_password}
app.clickhouse.driver-class-name=${APP_CLICKHOUSE_DRIVER:com.clickhouse.jdbc.ClickHouseDriver}

app.docker.default-host-url=${APP_DOCKER_HOST_URL:${DOCKER_HOST:unix:///var/run/docker.sock}}
app.docker.connect-timeout=${APP_DOCKER_CONNECT_TIMEOUT:PT5S}
app.docker.read-timeout=${APP_DOCKER_READ_TIMEOUT:PT30S}

app.security.jwt.issuer=${APP_JWT_ISSUER:docker-audit-api}
app.security.jwt.secret=${APP_JWT_SECRET:change-me-in-prod-please-change-me-in-prod-1234567890}
app.security.jwt.ttl=${APP_JWT_TTL:PT24H}

app.mail.enabled=${APP_MAIL_ENABLED:false}
app.mail.from=${MAIL_FROM:NN2 Audit Docker <no-reply@example.com>}

spring.mail.host=${MAIL_SMTP_HOST:smtp.mail.ru}
spring.mail.port=${MAIL_SMTP_PORT:465}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.protocol=smtp
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=${MAIL_SMTP_SSL_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:false}
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_SMTP_CONNECTION_TIMEOUT:5000}
spring.mail.properties.mail.smtp.timeout=${MAIL_SMTP_TIMEOUT:10000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_SMTP_WRITE_TIMEOUT:10000}
